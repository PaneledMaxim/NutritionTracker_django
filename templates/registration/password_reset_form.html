{% extends "base.html" %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-3">Восстановление пароля</h1>
                <p>Введите email, и Django создаст письмо с ссылкой для сброса пароля.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-dark" type="submit">Отправить ссылку</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
