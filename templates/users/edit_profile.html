{% extends "base.html" %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="h3 mb-3">Редактирование профиля</h1>

        <form method="post">
            {% csrf_token %}
            {{ user_form.as_p }}
            {{ profile_form.as_p }}
            <button class="btn btn-dark" type="submit">Сохранить</button>
        </form>
    </div>
</div>
{% endblock %}
