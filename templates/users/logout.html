{% extends "base.html" %}

{% block title %}Выход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-3">Выход из системы</h1>

                <form method="post">
                    {% csrf_token %}
                    <p>Нажмите кнопку, чтобы выйти из аккаунта.</p>
                    <button class="btn btn-outline-dark" type="submit">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
